[theme]
base = "dark"
primaryColor = "#4CAF50"
backgroundColor = "#0f1923"
secondaryBackgroundColor = "#1a2632"
textColor = "#F0F4F0"
font = "sans serif"

[client]
toolbarMode = "minimal"

[server]
disconnectedSessionTTL = 3600
websocketPingInterval = 30
enableWebsocketCompression = false
maxUploadSize = 50

[browser]
gatherUsageStats = false
