[theme]
base = "light"
primaryColor = "#2E7D32"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7F5"
textColor = "#212121"
font = "sans serif"

[client]
toolbarMode = "minimal"

[server]
disconnectedSessionTTL = 3600
websocketPingInterval = 30
enableWebsocketCompression = false
maxUploadSize = 50

[browser]
gatherUsageStats = false
